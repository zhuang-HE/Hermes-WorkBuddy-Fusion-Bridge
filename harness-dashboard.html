<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkBuddy Harness Dashboard v3.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:#0d1117;color:#c9d1d9;padding:20px}
h1{font-size:24px;color:#58a6ff;margin-bottom:8px}
.sub{color:#8b949e;font-size:14px;margin-bottom:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px}
.card h3{margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.bar-bg{background:#21262d;border-radius:4px;height:8px;margin:8px 0;overflow:hidden}
.bar-fg{height:100%;border-radius:4px;transition:width .5s}
.green{background:#3fb950}.yellow{background:#d29922}.orange{background:#db6d28}.red{background:#f85149}
.pill{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600}
.pill-on{background:#1a3a2a;color:#3fb950}.pill-off{background:#3a1a1a;color:#f85149}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:6px 8px;text-align:left;border-bottom:1px solid #21262d}
th{color:#8b949e;font-weight:500}
.stat{font-size:28px;font-weight:700}
.dim{color:#8b949e;font-size:12px}
</style>
</head>
<body>
<h1>⚡ WorkBuddy Harness v3.0</h1>
<p class="sub">9 Dimensional AI Agent Infrastructure — <span id="ts"></span></p>

<div class="grid" id="dash"></div>

<p class="dim" style="margin-top:20px;text-align:center" id="status">Loading...</p>

<script>
const DATA = {
  dimensions: [
    { id:'D1', name:'Identity', score:90, plugin:'context-awareness', desc:'四维上下文感知·动态策略调整' },
    { id:'D2', name:'Memory', score:90, plugin:'memory-decay', desc:'指数衰减模型·重要性加权压缩' },
    { id:'D3', name:'Skills', score:90, plugin:'skill-semantic-router', desc:'53+Skills·语义路由·自进化' },
    { id:'D4', name:'Learning', score:90, plugin:'learning-loop', desc:'五阶段闭环·OBSERVE→APPLY' },
    { id:'D5', name:'Orchestration', score:88, plugin:'task-orchestrator', desc:'WorkerPool·PriorityQueue·Retry' },
    { id:'D6', name:'Integration', score:82, plugin:'fusion-router', desc:'智能路由·增量同步·健康监控' },
    { id:'D7', name:'Security', score:85, plugin:'runtime-guardian', desc:'12危险模式·文件控制·异常检测' },
    { id:'D8', name:'Evaluation', score:85, plugin:'eval-framework', desc:'五维评测·30用例·A/B+回归' },
    { id:'D9', name:'Multi-Agent', score:85, plugin:'multi-agent-orchestrator', desc:'8团队模板·IPC进程·5角色' },
  ],
  plugins: [
    { id:'P4-1', name:'task-orchestrator', dim:'D5', lines:636, tests:'8/8' },
    { id:'P4-2', name:'eval-framework', dim:'D8', lines:509, tests:'9/9' },
    { id:'P4-3', name:'multi-agent-orchestrator', dim:'D9', lines:511, tests:'6/6' },
    { id:'P4-4', name:'runtime-guardian', dim:'D7', lines:785, tests:'6/6' },
    { id:'P4-5', name:'context-awareness', dim:'D1', lines:389, tests:'8/8' },
    { id:'P4-6', name:'memory-decay', dim:'D2', lines:520, tests:'9/9' },
    { id:'P4-7', name:'fusion-sync-enhancer', dim:'D6', lines:320, tests:'9/9' },
    { id:'P4-8', name:'learning-loop', dim:'D4', lines:180, tests:'6/6' },
    { id:'P4-9', name:'fusion-router', dim:'D6', lines:200, tests:'new' },
  ],
  hooks: { total:18, enabled:12, disabled:6 },
  baselines: { suites:5, cases:30, models:3 },
  overall: 88
};

function colorFor(s) {
  if (s >= 90) return 'green';
  if (s >= 80) return 'yellow';
  if (s >= 60) return 'orange';
  return 'red';
}

function render() {
  document.getElementById('ts').textContent = new Date().toISOString().slice(0,19).replace('T',' ');
  
  let html = '';
  
  // Overall card
  html += '<div class="card" style="grid-column:1/-1"><h3>📊 Harness 体系成熟度 <span class="stat" style="color:#58a6ff">' + DATA.overall + '%</span></h3>';
  html += '<div class="bar-bg"><div class="bar-fg green" style="width:' + DATA.overall + '%"></div></div>';
  html += '<table><tr><th>插件</th><th>Hooks</th><th>基准用例</th><th>测试通过</th></tr>';
  html += '<tr><td>9</td><td>'+DATA.hooks.total+' ('+DATA.hooks.enabled+' ON)</td><td>'+DATA.baselines.suites+'套件×'+DATA.baselines.cases+'用例</td><td>61</td></tr></table>';
  html += '</div>';
  
  // Dimension cards
  DATA.dimensions.forEach(d => {
    html += '<div class="card"><h3>' + d.id + ' ' + d.name + ' <span class="stat" style="color:#58a6ff">' + d.score + '%</span></h3>';
    html += '<div class="bar-bg"><div class="bar-fg ' + colorFor(d.score) + '" style="width:' + d.score + '%"></div></div>';
    html += '<p class="dim">' + d.plugin + '</p><p style="font-size:13px">' + d.desc + '</p></div>';
  });
  
  // Plugin table
  html += '<div class="card" style="grid-column:1/-1"><h3>🔌 插件清单</h3><table>';
  html += '<tr><th>ID</th><th>名称</th><th>维度</th><th>代码行</th><th>测试</th></tr>';
  DATA.plugins.forEach(p => {
    html += '<tr><td>' + p.id + '</td><td>' + p.name + '</td><td>' + p.dim + '</td><td>' + p.lines + '</td><td>' + p.tests + '</td></tr>';
  });
  html += '</table></div>';
  
  document.getElementById('dash').innerHTML = html;
  document.getElementById('status').textContent = 'Harness Dashboard v3.0 — 9维度·9插件·18Hooks·30用例';
}

render();
</script>
</body>
</html>
